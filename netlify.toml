# Static site — nothing to build, just publish the folder as-is.
[build]
  publish = "."
  command = ""

# The deploy failed because Netlify tried to init a submodule that has
# no URL. Nothing here needs submodules.
[build.environment]
  GIT_LFS_ENABLED = "false"

# ── Caching ────────────────────────────────────────────
# The stylesheet and modules change on every edit, so they must never
# be served stale — a cached main.css is what made three rounds of real
# fixes look like nothing had changed.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Images are content-addressed by name and effectively immutable.
[[headers]]
  for = "/assets-opt/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Security ───────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

# The admin panel must never be indexed.
[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
